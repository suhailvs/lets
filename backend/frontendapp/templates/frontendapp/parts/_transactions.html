{% for txn in transactions %}
<div class="card mb-2">
  <div class="card-body py-2 d-flex justify-content-between align-items-center">
    <div>
      <span class="fw-semibold">{{ txn.buyer.username }}</span>
      paid
      <span class="fw-semibold">{{ txn.seller.username }}</span>
      &mdash; {{ txn.description }}
      <small class="text-muted ms-2">{{ txn.amount }} credits</small>
    </div>
    {% if txn.initiator == request.user %}
    <form method="post" action="{% url 'frontendapp:delete_transaction' txn.id %}"
          onsubmit="return confirm('Delete this transaction and reverse balances?')">
      {% csrf_token %}
      <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
    </form>
    {% endif %}
  </div>
</div>
{% empty %}
<p class="text-muted">No transactions yet.</p>
{% endfor %}
